<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
  </head>
  <style>
    body {
      margin: 0;
    }
    .topnav {
      background-color: #333;
      overflow: hidden;
    }

    .topnav a {
      float: left;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }

    .topnav a:hover {
      background-color: #ddd;
      color: black;
    }

    .topnav a.active {
      background-color: #04aa6d;
      color: white;
    }
  </style>
  <body>
    <div class="topnav">
      <a href="{{url_for('home')}}">Home</a>
      <a href="{{url_for('opgaver')}}">Opgaver</a>
      <a href="{{url_for('plants_overview')}}">Plante Oversigt</a>
      <a class="active" href="#login">LogIn</a>
      <a href="{{url_for('register')}}">Sign Up</a>
    </div>

    <h1>Login</h1>

    {% if error %}
    <p style="color: red">{{ error }}</p>
    {% endif %}

    <form method="POST">
      <label for="username">Brugernavn: </label>
      <input type="text" id="username" name="username" required /><br /><br />

      <label for="password">Kodeord: </label>
      <input
        type="password"
        id="password"
        name="password"
        required
      /><br /><br />

      <a href="{{url_for('register')}}">Har ikke en account? Sign up</a> <br />
      <button type="submit">Login</button><br />
    </form>
  </body>
</html>
