<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Plants Overview</title>
    <style>
      body {
        margin: 0;
      }

      h1 {
        color: #2f5d3a;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 10px;
        overflow: hidden;
      }
      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
        text-align: left;
      }
      th {
        background: #4f8f5f;
        color: white;
      }
      tr:hover {
        background: #eef7ee;
      }
      .active {
        color: green;
        font-weight: bold;
      }
      .inactive {
        color: red;
        font-weight: bold;
      }
      .topnav {
        background-color: #333;
        overflow: hidden;
      }
      .topnav a {
        float: left;
        color: #f2f2f2;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
        font-size: 17px;
      }
      .topnav a:hover {
        background-color: #ddd;
        color: black;
      }
      .topnav a.active {
        background-color: #04aa6d;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="topnav">
      <a href="{{url_for('home')}}">Home</a>
      <a href="{{url_for('opgaver')}}">Opgaver</a>
      <a class="active" href="#planter">Plante Oversigt</a>
      <a href="{{url_for('login')}}">LogIn</a>
      <a href="{{url_for('register')}}">Sign Up</a>
    </div>
    <h1>Plants Overview</h1>

    <table>
      <thead>
        <tr>
          <th>Plant ID</th>
          <th>Zone</th>
          <th>Plant</th>
          <th>Type</th>
          <th>Active</th>
          <th>Water Amount</th>
        </tr>
      </thead>
      <tbody>
        {% for plant in plants %}
        <tr>
          <td>{{ plant.plant_id }}</td>
          <td>Zone {{ plant.zone_id }}</td>
          <td>{{ plant.plant }}</td>
          <td>{{ plant.plant_type }}</td>
          <td
            class="{{ 'active' if plant.is_active == 'yes' else 'inactive' }}"
          >
            {{ plant.is_active }}
          </td>
          <td>{{ plant.water_ammount }} ml</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
