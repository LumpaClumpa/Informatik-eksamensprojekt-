<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        margin: 0;
    }
    .topnav {
      background-color: #333;
      overflow: hidden;
    }
    
    .topnav a {
      float: left;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }
    
    .topnav a:hover {
      background-color: #ddd;
      color: black;
    }
    
    .topnav a.active {
      background-color: #04AA6D;
      color: white;
    }
</style>
<body>
    <div class="topnav">
        <a href="/home">Home</a>
        <a href="#opgaver">Opgaver</a>
        <a href="#planter">Plante Oversigt</a>
        <a href="/login">LogIn</a>
        <a class="active" href="#signout">SignOut</a>
    </div>

    <h1>Register en account</h1>

    <form id="registerForm">
        <label for="username">Brugernavn: </label>
        <input type="text" id="username" name="username" required><br><br>

        <label for="password">Kodeord: </label>
        <input type="password" id="password" name="password" required><br><br>

        <label>Rolle:</label>
        <input type="radio" id="teacher" name="role" value="teacher" required> Lærer
        <input type="radio" id="student" name="role" value="student" required> Elev <br><br>

        <div id="teacherPasswordBox" style="display:none;">
            <label for="teacherPassword">Lærer-kode:</label>
            <input type="password" id="teacherPassword">
            <br><br>
        </div>

        <a href="/login">Har en account? sign in</a> <br>
        <button type="submit">Sign Up</button><br>
        <div id="message"></div>
    </form>

    <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const role = document.querySelector('input[name="role"]:checked').value;
        const teacherPasswordBox = document.getElementById('teacherPasswordBox');
        const teacherPassword = document.getElementById('teacherPassword');
        const message = document.getElementById('message');

        if (role === 'teacher' && teacherPasswordBox.style.display === 'none') {
            teacherPasswordBox.style.display = 'block';
            teacherPassword.required = true;
            teacherPassword.focus();
            message.textContent = 'Indtast lærer-koden';
            return;
        }

        if (role === 'teacher' && teacherPassword.value !== '9876') {
            message.textContent = 'Forkert lærer-kode';
            return;
        }

        const userData = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            role: role,
            teacher_password: role === 'teacher' ? teacherPassword.value : null
        };

        try {
            const response = await fetch('/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(userData)
            });

            if (response.ok) {
                message.textContent = 'Registration successful!';
                window.location.href = "/home";
            } else {
                const error = await response.json();
                message.textContent = error.error || 'Registration failed';
            }

        } catch (error) {
            message.textContent = 'Error: ' + error.message;
        }
    });
</script>

</body>
</html>
