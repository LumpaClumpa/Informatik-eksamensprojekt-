<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        margin: 0;
    }
    .topnav {
      background-color: #333;
      overflow: hidden;
    }
    
    .topnav a {
      float: left;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }
    
    .topnav a:hover {
      background-color: #ddd;
      color: black;
    }
    
    .topnav a.active {
      background-color: #04AA6D;
      color: white;
    }
</style>
<body>
    <div class="topnav">
        <a href="/home">Home</a>
        <a href="#opgaver">Opgaver</a>
        <a href="/plants">Plante Oversigt</a>
        <a href="/login">LogIn</a>
        <a class="active" href="#signout">SignOut</a>
    </div>

    <h1>Register en account</h1>

    <form id="registerForm">
        <label for="username">Brugernavn: </label>
        <input type="text" id="username" name="username" required><br><br>

        <label for="password">Kodeord: </label>
        <input type="password" id="password" name="password" required><br><br>

        <label>Rolle:</label>
        <input type="radio" id="teacher" name="role" value="teacher" required> Lærer
        <input type="radio" id="student" name="role" value="student" required> Elev <br><br>

        <a href="{{url_for('login')}}">Har en account? sign in</a> <br>
        <button type="submit">Sign Up</button><br>
        <div id="message"></div>
    </form>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const userData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                role: document.querySelector('input[name="role"]:checked').value
            };

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();

                if (response.ok) {
                    document.getElementById('message').textContent = 'Registration successful! Redirecting to login...';
                    document.getElementById('registerForm').reset();
                    setTimeout(() => {
                        window.location.href = '{{url_for("login")}}';
                    }, 2000);
                } else {
                    document.getElementById('message').textContent = result.error || 'Registration failed';
                }
            } catch (error) {
                document.getElementById('message').textContent = 'Error: ' + error.message;
            }
        });
    </script>

</body>
</html>
