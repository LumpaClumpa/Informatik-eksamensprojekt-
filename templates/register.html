<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        margin: 0;
    }
    .topnav {
      background-color: #333;
      overflow: hidden;
    }
    
    .topnav a {
      float: left;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }
    
    .topnav a:hover {
      background-color: #ddd;
      color: black;
    }
    
    .topnav a.active {
      background-color: #04AA6D;
      color: white;
    }
    </style>
<body>
    <div class="topnav">
        <a href="{{url_for('home')}}">Home</a>
        <a href="#opgaver">Opgaver</a>
        <a href="#planter">Plante Oversigt</a>
        <a class="active" href="#login">LogIn</a>
        <a href="#signout">SignOut</a>
    </div>

    <h1>Register en account</h1>

    <form method="POST">
        <label for="username">Brugernavn: </label>
        <input type="text" id="username" name="username" required><br><br>
    
        <label for="password">Kodeord: </label>
        <input type="password" id="password" name="password" required><br><br>

        <input type="radio" id="teacher" name="choice" value="1"> Lærer
        <input type="radio" id="student" name="choice" value="2"> Elev <br><br>
    
        <a href="{{url_for('login')}}">Har en account? sign in</a> <br>
        <button type="submit">Sign Up</button><br>
        
      </form>

</body>
</html>
