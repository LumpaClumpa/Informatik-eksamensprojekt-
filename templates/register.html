<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        margin: 0;
    }
    .topnav {
      background-color: #333;
      overflow: hidden;
    }
    
    .topnav a {
      float: left;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }
    
    .topnav a:hover {
      background-color: #ddd;
      color: black;
    }
    
    .topnav a.active {
      background-color: #04AA6D;
      color: white;
    }
    </style>
<body>
    <div class="topnav">
        <a href="{{url_for('home')}}">Home</a>
        <a href="#opgaver">Opgaver</a>
        <a href="#planter">Plante Oversigt</a>
        <a href="{{url_for('login')}}">LogIn</a>
        <a class="active" href="#signout">Sign Up</a>
    </div>

    <h1>Register en account</h1>

    <form method="POST" id="registerForm">
        <label for="username">Brugernavn: </label>
        <input type="text" id="username" name="username" required><br><br>
    
        <label for="password">Kodeord: </label>
        <input type="password" id="password" name="password" required><br><br>

        <label><input type="radio" name="role" value="student" required>Student</label>
        <label><input type="radio" name="role" value="teacher">Teacher</label><br>
    
        <a href="{{url_for('login')}}">Har en account? sign in</a> <br>
        <button type="submit">Sign Up</button><br>

        <div id="passwordBox" style="display:none;">
            <p>Enter teacher password:</p>
            <input id="teacherPassword" type="password">
            <button id="passwordSubmit">Continue</button>
        </div>
        <script>
            const form = document.getElementById("registerForm");
            const passwordBox = document.getElementById("passwordBox");
          
            form.addEventListener("submit", function (event) {
              event.preventDefault();
          
              const role = document.querySelector('input[name="role"]:checked').value;
          
              if (role === "teacher") {
                passwordBox.style.display = "block";
              } else {
                window.location.href = "home.html";
              }
            });
          
            document.getElementById("passwordSubmit").addEventListener("click", function () {
              const password = document.getElementById("teacherPassword").value;
          
              if (password === "9876") {
                window.location.href = "home.html";
              } else {
                alert("Wrong password");
              }
            });
        </script>
</body>
</html>
