<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start side</title>
  </head>
  <style>
    body {
      margin: 0;
    }
    .topnav {
      background-color: #333;
      overflow: hidden;
    }

    .topnav a {
      float: left;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }

    .topnav a:hover {
      background-color: #ddd;
      color: black;
    }

    .topnav a.active {
      background-color: #04aa6d;
      color: white;
    }
  </style>
  <body>
    <div class="topnav">
      <a class="active" href="#home">Home</a>
      <a href="{{url_for('opgaver')}}">Opgaver</a>
      <a href="{{url_for('plants_overview')}}">Plante Oversigt</a>
      <a href="{{url_for('login')}}">LogIn</a>
      <a href="{{url_for('register')}}">Sign Up</a>
    </div>

    <h1>Du er nu logget ind som lærer</h1>
    <h3>Fori du er logget ind som lærer kan du nu lave opgaver til eleverne under opgaver, og se hvornår en elev har lavet en opgave</h3>

    {% if locked %}
    <div class="login-overlay">
      <div class="login-box">
        <h2>Log ind for at få adgang</h2>
        <a href="{{ url_for('login') }}">Go to login</a>
      </div>
    </div>
    {% endif %}
  </body>
</html>
